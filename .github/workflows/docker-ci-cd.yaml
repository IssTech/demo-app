name: Docker CI/CD (Dynamic Tagging & Auto-Increment)

on:
  push:
    branches:
      - main
      - AgenticAI # Triggers on your test branch too
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Define the base names for your two separate image destinations
  IMAGE_BACKEND: ghcr.io/isstech/demo-backend
  IMAGE_FRONTEND: ghcr.io/isstech/demo-frontend
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Fixes the Node.js deprecation warning

jobs:
  # ==========================================
  # JOB 1: BACKEND BUILD & PUSH
  # ==========================================
  build-and-push-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- BACKEND TAGGING logic ---
      - name: Calculate Backend Tags
        id: tags-backend
        run: |
          if [ "${{ github.ref_name }}" != "main" ]; then
            # Clean branch name for non-main branches (e.g., AgenticAI)
            CLEAN_BRANCH=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9._-]/ -/g')
            echo "FINAL_TAGS=${{ env.IMAGE_BACKEND }}:${CLEAN_BRANCH}" >> $GITHUB_ENV
          else
            # Auto-increment loop for main branch
            PATCH_VERSION=0
            while docker manifest inspect ${{ env.IMAGE_BACKEND }}:v1.1.${PATCH_VERSION} > /dev/null 2>&1; do
              PATCH_VERSION=$((PATCH_VERSION + 1))
            done
            echo "FINAL_TAGS=${{ env.IMAGE_BACKEND }}:v1.1.${PATCH_VERSION},${{ env.IMAGE_BACKEND }}:latest" >> $GITHUB_ENV
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ env.FINAL_TAGS }}

  # ==========================================
  # JOB 2: FRONTEND BUILD & PUSH
  # ==========================================
  build-and-push-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- FRONTEND TAGGING logic ---
      - name: Calculate Frontend Tags
        id: tags-frontend
        run: |
          if [ "${{ github.ref_name }}" != "main" ]; then
            # Clean branch name for non-main branches (e.g., AgenticAI)
            CLEAN_BRANCH=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9._-]/ -/g')
            echo "FINAL_TAGS=${{ env.IMAGE_FRONTEND }}:${CLEAN_BRANCH}" >> $GITHUB_ENV
          else
            # Auto-increment loop for main branch (Calculated independently from backend)
            PATCH_VERSION=0
            while docker manifest inspect ${{ env.IMAGE_FRONTEND }}:v1.1.${PATCH_VERSION} > /dev/null 2>&1; do
              PATCH_VERSION=$((PATCH_VERSION + 1))
            done
            echo "FINAL_TAGS=${{ env.IMAGE_FRONTEND }}:v1.1.${PATCH_VERSION},${{ env.IMAGE_FRONTEND }}:latest" >> $GITHUB_ENV
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ env.FINAL_TAGS }}