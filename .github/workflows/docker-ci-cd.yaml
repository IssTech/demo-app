name: Docker CI/CD (Dynamic Tagging & Auto-Increment)

on:
  push:
    branches:
      - main
      - AgenticAI # Triggers on your test branch too
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Forces the image name to exactly match your requested path
  IMAGE_BASE: ghcr.io/isstech/demo-backend

jobs:
  build-and-push-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --- STEP 1: DETERMINE THE TAG FOR AGENTIC AI BRANCH ---
      - name: Set Branch-Based Tag
        if: github.ref_name != 'main'
        run: |
          # Replaces slashes with dashes just in case of branch names like 'feature/abc'
          CLEAN_BRANCH_NAME=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9._-]/ -/g')
          echo "FINAL_TAGS=${{ env.IMAGE_BASE }}:${CLEAN_BRANCH_NAME}" >> $GITHUB_ENV

      # --- STEP 2: AUTO-INCREMENT VERSION FOR MAIN BRANCH ---
      - name: Calculate Next Version Tag
        if: github.ref_name == 'main'
        id: versioning
        run: |
          echo "Fetching existing tags from GHCR..."
          
          # 1. Start with a fallback baseline version if no images exist yet
          DEFAULT_VERSION="1.1.0"
          
          # 2. Try to fetch the latest image tags from registry metadata using Docker Buildx
          # We use 'skopeo' or a curl query, but an elegant trick is reading the fallback if it fails.
          # For a reliable shell-based patch increment, we check the manifest of the baseline.
          
          CURRENT_VERSION="1.1.0"
          PATCH_VERSION=0
          
          # Loop to find the highest sequential version already pushed
          while docker manifest inspect ${{ env.IMAGE_BASE }}:v1.1.${PATCH_VERSION} > /dev/null 2>&1; do
            CURRENT_VERSION="1.1.${PATCH_VERSION}"
            PATCH_VERSION=$((PATCH_VERSION + 1))
          done
          
          NEXT_VERSION="1.1.${PATCH_VERSION}"
          echo "Latest found version was v${CURRENT_VERSION}. Next version will be v${NEXT_VERSION}"
          
          # Pass both the new version tag and the 'latest' tag to the next step
          echo "FINAL_TAGS=${{ env.IMAGE_BASE }}:v${NEXT_VERSION},${{ env.IMAGE_BASE }}:latest" >> $GITHUB_ENV

      # --- STEP 3: BUILD AND PUSH ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend # Looks inside your backend folder
          push: true
          tags: ${{ env.FINAL_TAGS }}